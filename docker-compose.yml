services:
  credit-risk-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MODEL_URI: ${MODEL_URI:-models:/CreditRiskBestModel/Production}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-file:/app/mlruns}
    volumes:
      - ./artifacts:/app/artifacts:ro
      - ./mlruns:/app/mlruns:ro
